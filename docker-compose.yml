services:
  postgres:
    image: postgres:16-alpine
    container_name: solarmonitor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: solarmonitor
      POSTGRES_PASSWORD: solarmonitor
      POSTGRES_DB: solarmonitor
    ports:
      - "5432:5432"
    volumes:
      - solarmonitor_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solarmonitor -d solarmonitor"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  solarmonitor_postgres_data:
